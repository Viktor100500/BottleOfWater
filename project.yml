name: BottleOfWater
options:
  bundleIdPrefix: com.vlasov
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"
targets:
  BottleOfWater:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
      - Shared
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: Bottle of Water
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSHealthShareUsageDescription: "Bottle of Water shows your water history from Apple Health."
        NSHealthUpdateUsageDescription: "Bottle of Water saves every water entry to Apple Health in real time."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vlasov.bottleofwater
        CODE_SIGN_ENTITLEMENTS: App/BottleOfWater.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: BottleWidget
        embed: true
  BottleWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget/Sources
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Bottle of Water
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vlasov.bottleofwater.widget
        CODE_SIGN_ENTITLEMENTS: Widget/BottleWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
